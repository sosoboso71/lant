<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Word Chain – IndoFinity</title>

<style>
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: radial-gradient(circle at top, #111 0, #000 60%);
        color: #fff;
        overflow: hidden;
    }
    .wrapper {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 80px;
        gap: 20px;
    }
    #letters-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        align-items: flex-start;
        max-width: 80%;
    }
    .letter-box {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 900;
        text-shadow: 0 0 8px rgba(0,0,0,0.8);
        transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .letter-box:hover { transform: scale(1.05); }
    .letter-box.used {
        background: #4caf50 !important;
        box-shadow: 0 0 20px #4caf50, 0 0 40px #4caf50 !important;
        color: #fff;
    }
    #timer {
        font-size: 20px;
        font-weight: 600;
        text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    #info-panel {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.35);
        padding: 20px 35px;
        border-radius: 16px;
        font-size: 32px;
        font-weight: 800;
        color: #fff;
        text-align: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 99999;
        max-width: 90%;
        line-height: 1.3;
        backdrop-filter: blur(6px);
    }
    .title {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 12px rgba(255,255,255,0.6);
    }
    .column {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }
    .word-piece {
        width: 50px;
        height: 50px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    #scoreOverlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(10,10,10,0.95);
        padding: 20px 40px;
        border-radius: 16px;
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        text-align: center;
        font-size: 18px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        z-index: 9999;
    }
    #scoreOverlay.show { opacity: 1; pointer-events: auto; }
</style>
</head>

<body>

<div class="wrapper">
    <div id="letters-container"></div>
    <div id="timer">Litere folosite: 0 / 0</div>
    <div id="info-panel"></div>
</div>

<div id="scoreOverlay">
    <div id="ovUser"></div>
    <div id="ovText"></div>
    <div id="ovPoints"></div>
</div>

<script>
// ----------------------------
// CONECTARE TIKFINITY
// ----------------------------
const socket = new WebSocket("ws://localhost:62024");

socket.onopen = () => console.log("Conectat la TikFinity!");

socket.onmessage = (event) => {
    const packet = JSON.parse(event.data);
    if (packet.event === "chat") {
        const user =
            packet.data.nickname ||
            packet.data.uniqueId ||
            packet.data.displayName ||
            packet.data.username ||
            "necunoscut";

        const message = packet.data.comment || "";
        handleChat(user, message);
    }
};

// ----------------------------
// ELEMENTE HTML
// ----------------------------
const lettersContainer = document.getElementById("letters-container");
const timerEl = document.getElementById("timer");
const infoPanel = document.getElementById("info-panel");
const scoreOverlay = document.getElementById("scoreOverlay");
const ovUser = document.getElementById("ovUser");
const ovText = document.getElementById("ovText");
const ovPoints = document.getElementById("ovPoints");

// ----------------------------
// LISTĂ CUVINTE INTERZISE
// ----------------------------
const bannedWords = [
    "pula","pule","puli","pulii","pizda","pizde","muie","muii",
    "fut","fute","futut","fututa","fututi","futai","cur","curu",
    "curva","curve","handicapat","prost","idiot","retard","nebun",
    "sex","porno","porn","penis","vagina","suge","sugi","mortii",
    "dracu","matii","muistu","pizdar","pizduta"
];

// ----------------------------
// JOC WORDCHAIN – SCORURI FIXATE
// ----------------------------
let currentWord = "",
    roundActive = false,
    usedWords = new Set,
    usedLetters = new Set,
    startWords = [];

let todayDate = new Date().toISOString().slice(0,10);
let dailyScores = {}, globalScores = {};

function loadScores(){
    try{
        const d = localStorage.getItem("lcDailyScores");
        const g = localStorage.getItem("lcGlobalScores");
        const saved = localStorage.getItem("lcDailyDate");

        dailyScores = d ? JSON.parse(d) : {};
        globalScores = g ? JSON.parse(g) : {};

        if(!saved || saved !== todayDate){
            dailyScores = {};
            localStorage.setItem("lcDailyDate", todayDate);
            saveDailyScores();
        }
    }catch{
        dailyScores = {};
        globalScores = {};
    }
}

function saveDailyScores(){
    localStorage.setItem("lcDailyScores", JSON.stringify(dailyScores));
}

function saveGlobalScores(){
    localStorage.setItem("lcGlobalScores", JSON.stringify(globalScores));
}

function addPoints(user, pts){
    if(!dailyScores[user]) dailyScores[user] = 0;
    if(!globalScores[user]) globalScores[user] = 0;

    dailyScores[user] += pts;
    globalScores[user] += pts;

    saveDailyScores();
    saveGlobalScores();
}

fetch("words.json")
    .then(e => e.json())
    .then(e => {
        startWords = e
            .filter(e => typeof e === "string")
            .map(e => e.trim().toLowerCase())
            .filter(e => e.length > 0);
        loadScores();
        startRound();
    });

const neonColors = [
    "#00eaff","#ff00f7","#00ff6a","#ff006e","#7b2ff7",
    "#00f5d4","#ff5400","#9d4edd","#ff1493","#39ff14",
    "#1e90ff","#ff4500","#9400d3","#00ffff","#ff2e00"
];

function randomNeonColor(){
    return neonColors[Math.floor(Math.random()*neonColors.length)];
}

function renderWord(w){
    lettersContainer.innerHTML = "";
    w.split("").forEach((t,i)=>{
        const c = document.createElement("div");
        c.classList.add("column");
        c.dataset.letter = t;
        c.dataset.index = i;

        const b = document.createElement("div");
        b.classList.add("letter-box");
        const col = randomNeonColor();
        b.style.background = col;
        b.style.boxShadow = `0 0 20px ${col}, 0 0 40px ${col}`;
        b.textContent = t.toUpperCase();

        if(usedLetters.has(i)) b.classList.add("used");

        c.appendChild(b);
        lettersContainer.appendChild(c);
    });
    updateLettersStatus();
}

function placeWordUnderLetter(i, word){
    const col = document.querySelector(`.column[data-index="${i}"]`);
    if(!col) return;
    word.slice(1).toUpperCase().split("").forEach(l=>{
        const p = document.createElement("div");
        p.classList.add("word-piece");
        const c = randomNeonColor();
        p.style.background = c;
        p.style.boxShadow = `0 0 15px ${c}, 0 0 30px ${c}`;
        p.textContent = l;
        col.appendChild(p);
    });
}

function showInfo(t){
    infoPanel.textContent = t;
    infoPanel.style.opacity = 1;
    setTimeout(()=>infoPanel.style.opacity = 0, 5000);
}

function showScoreOverlay(u, txt, pts, total){
    ovUser.innerHTML = `<strong>${u}</strong>`;
    ovText.textContent = txt;
    ovPoints.textContent = `+${pts} puncte (total: ${total})`;
    scoreOverlay.classList.add("show");
    setTimeout(()=>scoreOverlay.classList.remove("show"), 2500);
}

const funnyLines = [
    "🧠 ai creier turbo!",
    "🔥 ai detonat litera!",
    "⚡ ai gasit cuvantul perfect!",
    "😎 esti maestru la WordChain!",
    "🚀 ai zburat cu raspunsul!",
    "👑 esti rege la WordChain!"
];

function updateLettersStatus(){
    timerEl.textContent = `Litere folosite: ${usedLetters.size} / ${currentWord.length}`;
}

function startRound(){
    if(!startWords || startWords.length === 0)
        return setTimeout(startRound, 200);

    currentWord = startWords[Math.floor(Math.random()*startWords.length)];
    usedWords = new Set([currentWord.toLowerCase()]);
    usedLetters = new Set();
    roundActive = true;
    renderWord(currentWord);
    showInfo(`Cuvânt nou: ${currentWord.toUpperCase()} – foloseste literele lui pentru a forma substantive.`);
}

function getRank(u){
    const idx = Object
        .entries(dailyScores)
        .sort((a,b)=>b[1]-a[1])
        .findIndex(([x])=>x===u);
    return idx === -1 ? null : idx + 1;
}

function handleChat(user, msg){
    msg = msg.trim().toLowerCase();
    if(!/^[a-zăâîșț]+$/i.test(msg)) return;

    // filtrare cuvinte interzise
    if (bannedWords.some(bw => msg.includes(bw))) return;

    if(msg === "top"){
        const t = Object.entries(dailyScores)
            .sort((a,b)=>b[1]-a[1])
            .slice(0,5)
            .map(([u,s],i)=>`${i+1}. ${u}: ${s}p`)
            .join(" | ");
        showInfo("Top zilnic: " + (t || "nimeni încă"));
        return;
    }

    if(msg === "global"){
        const t = Object.entries(globalScores)
            .sort((a,b)=>b[1]-a[1])
            .slice(0,5)
            .map(([u,s],i)=>`${i+1}. ${u}: ${s}p`)
            .join(" | ");
        showInfo("Top global: " + (t || "nimeni încă"));
        return;
    }

    if(msg === "score"){
        const sc = dailyScores[user] || 0;
        const r = getRank(user);
        const txt = r ? `ești pe locul ${r} local` : "nu ești încă în clasament";
        showInfo(`${user}, ai ${sc} puncte, ${txt}.`);
        return;
    }

    if(!roundActive) return;

    const clean = msg
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/[^a-z]/g,"");
    if(clean.length < 2) return;

    const first = clean[0];
    const letters = currentWord.toLowerCase().split("");
    const unique = [...new Set(letters)];

    if(!unique.includes(first)){
        showInfo(`${user}: cuvântul trebuie să înceapă cu una din literele din "${currentWord.toUpperCase()}"`);
        return;
    }

    const positions = [];
    letters.forEach((l,i)=>{ if(l===first) positions.push(i); });

    let pos = null;
    for(const p of positions) if(!usedLetters.has(p)){ pos = p; break; }
    if(pos === null){
        showInfo(`${user}: toate literele "${first.toUpperCase()}" au fost folosite.`);
        return;
    }

    if(usedWords.has(clean)){
        showInfo(`${user}: cuvânt deja folosit!`);
        return;
    }

    usedWords.add(clean);
    usedLetters.add(pos);

    placeWordUnderLetter(pos, clean);

    const pts = 10;
    addPoints(user, pts);

    const funny = funnyLines[Math.floor(Math.random()*funnyLines.length)];
    showInfo(`${user}: ${clean.toUpperCase()} | +${pts}p`);
    updateLettersStatus();
    showScoreOverlay(user, funny, pts, dailyScores[user]);

    if (usedLetters.size === document.querySelectorAll(".column").length) { 
        roundActive = false;
        showInfo(`Runda terminata! Toate literele din "${currentWord.toUpperCase()}" au fost folosite.`);
        setTimeout(startRound, 2500);
    }
}
</script>

</body>
</html>
